<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="950" viewBox="0 0 1600 950">
  <defs>
    <style>
      .bg { fill: #f7f7f4; }
      .panel { fill: #ffffff; stroke: #1f1f1f; stroke-width: 3; }
      .soft { fill: #eeeeea; stroke: #1f1f1f; stroke-width: 2; }
      .bar { fill: #e2e2dc; stroke: #1f1f1f; stroke-width: 3; }
      .title { font: 700 28px system-ui, sans-serif; fill: #111; }
      .h { font: 700 18px system-ui, sans-serif; fill: #111; }
      .t { font: 14px system-ui, sans-serif; fill: #111; }
      .small { font: 12px system-ui, sans-serif; fill: #222; }
      .muted { font: 12px system-ui, sans-serif; fill: #555; }
      .btn { fill: #fbfbf8; stroke: #222; stroke-width: 2; rx: 4; }
      .input { fill: #fff; stroke: #222; stroke-width: 2; rx: 3; }
      .icon { stroke: #111; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .dash { stroke: #777; stroke-width: 2; stroke-dasharray: 7 7; fill: none; }
      .note { fill: #fff7d6; stroke: #8a6d00; stroke-width: 2; rx: 5; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="950"/>

  <!-- Application frame -->
  <rect class="panel" x="6" y="6" width="1588" height="938" rx="4"/>
  <rect class="bar" x="6" y="6" width="1588" height="42"/>
  <text class="title" x="18" y="35">PDF Text Extractor</text>

  <!-- Menu row -->
  <rect class="soft" x="6" y="48" width="1588" height="30"/>
  <text class="t" x="18" y="68">File</text>
  <text class="t" x="62" y="68">Edit</text>
  <text class="t" x="106" y="68">View</text>
  <text class="t" x="154" y="68">Tools</text>
  <text class="t" x="210" y="68">Help</text>

  <!-- Toolbar -->
  <rect class="bar" x="6" y="78" width="1588" height="54"/>
  <text class="muted" x="18" y="111">Toolbar uses icon buttons; each icon has tooltip, accessible name, menu item, and shortcut where useful.</text>

  <!-- Toolbar icon buttons -->
  <g transform="translate(470,88)">
    <rect class="btn" x="0" y="0" width="38" height="34"/>
    <path class="icon" d="M10 24 L19 11 L28 24 M19 11 V30"/>
    <rect class="btn" x="46" y="0" width="38" height="34"/>
    <path class="icon" d="M58 24 H73 M58 17 H73 M58 10 H68"/>
    <rect class="btn" x="92" y="0" width="38" height="34"/>
    <path class="icon" d="M120 9 L105 18 L120 27"/>
    <rect class="btn" x="138" y="0" width="38" height="34"/>
    <path class="icon" d="M151 9 L166 18 L151 27"/>
    <rect class="btn" x="184" y="0" width="38" height="34"/>
    <path class="icon" d="M197 10 L211 24 M211 10 L197 24"/>
    <rect class="btn" x="230" y="0" width="38" height="34"/>
    <path class="icon" d="M241 18 L248 25 L259 10"/>
    <rect class="btn" x="276" y="0" width="38" height="34"/>
    <path class="icon" d="M287 12 H305 M287 18 H301 M287 24 H305"/>
    <rect class="btn" x="322" y="0" width="38" height="34"/>
    <path class="icon" d="M334 25 C342 15 349 15 357 25 M334 11 C342 21 349 21 357 11"/>
    <rect class="btn" x="368" y="0" width="38" height="34"/>
    <path class="icon" d="M380 12 H394 M380 19 H398 M380 26 H390"/>
    <rect class="btn" x="414" y="0" width="38" height="34"/>
    <circle class="icon" cx="433" cy="17" r="7"/>
    <path class="icon" d="M433 5 V0 M433 34 V29 M421 17 H416 M450 17 H445"/>
  </g>

  <!-- Main area geometry -->
  <rect class="panel" x="6" y="132" width="350" height="764"/>
  <rect class="panel" x="356" y="132" width="640" height="764"/>
  <rect class="panel" x="996" y="132" width="598" height="764"/>
  <rect class="bar" x="6" y="896" width="1588" height="48"/>

  <!-- Left: source/work tree -->
  <rect class="soft" x="6" y="132" width="350" height="36"/>
  <text class="h" x="18" y="156">Source PDFs / Work Folders</text>
  <rect class="btn" x="310" y="137" width="34" height="26"/>
  <path class="icon" d="M319 151 H335 M327 143 V159"/>

  <text class="t" x="24" y="198">Folder</text>
  <path class="icon" d="M24 210 H46 L52 218 H80 V250 H24 Z"/>
  <text class="t" x="92" y="234">Classic Traveller</text>

  <path class="icon" d="M42 276 H66 V310 H42 Z M42 286 H66"/>
  <text class="t" x="82" y="300">Book 1 Characters Combat.pdf</text>
  <path class="icon" d="M42 326 H66 V360 H42 Z M42 336 H66"/>
  <text class="t" x="82" y="350">The Traveller Book.pdf</text>

  <!-- Left metadata -->
  <rect class="soft" x="6" y="650" width="350" height="42"/>
  <text class="h" x="18" y="678">File Metadata</text>
  <rect class="btn" x="302" y="657" width="42" height="28"/>
  <path class="icon" d="M315 676 L330 661 M327 661 L334 668 M312 680 L323 678"/>

  <text class="small" x="20" y="720">Title: Book 1: Characters &amp; Combat</text>
  <text class="small" x="20" y="744">Publisher: GDW</text>
  <text class="small" x="20" y="768">Edition: Classic Traveller</text>
  <text class="small" x="20" y="792">Source pages: 48</text>
  <text class="small" x="20" y="816">Hash: available</text>
  <text class="small" x="20" y="840">Cover page: user-selected</text>
  <text class="muted" x="20" y="872">Edit opens dialog with Save / Cancel.</text>

  <!-- Center: PDF/page view -->
  <rect class="soft" x="356" y="132" width="640" height="54"/>
  <rect class="btn" x="372" y="142" width="34" height="34"/>
  <path class="icon" d="M397 148 L382 159 L397 170"/>
  <rect class="btn" x="414" y="142" width="34" height="34"/>
  <path class="icon" d="M438 148 L424 159 L438 170"/>
  <text class="h" x="468" y="165">Page</text>
  <rect class="input" x="524" y="142" width="70" height="34"/>
  <text class="t" x="548" y="165">7</text>
  <text class="t" x="604" y="165">of 48</text>
  <rect class="btn" x="670" y="142" width="34" height="34"/>
  <path class="icon" d="M680 148 L694 159 L680 170"/>
  <rect class="btn" x="712" y="142" width="34" height="34"/>
  <path class="icon" d="M722 148 L737 159 L722 170"/>
  <text class="muted" x="770" y="164">PDF page drives text page.</text>

  <rect class="panel" x="406" y="224" width="540" height="610"/>
  <rect class="soft" x="462" y="270" width="430" height="510"/>
  <text class="h" x="575" y="520">PDF Page Preview</text>
  <text class="muted" x="530" y="548">Rendered source page, read-only</text>

  <rect class="soft" x="356" y="840" width="640" height="56"/>
  <text class="small" x="372" y="863">Page label: printed "1" | Page ID: 0007 | Status: edited | Source: OCR candidate</text>
  <text class="small" x="372" y="884">Diagnostics: possible reading order issue, OCR used, embedded/OCR delta &gt; 5%</text>

  <!-- Right: reviewed text and diagnostics -->
  <rect class="soft" x="996" y="132" width="598" height="54"/>
  <text class="h" x="1012" y="165">Reviewed Text: 0007.txt</text>
  <rect class="btn" x="1456" y="142" width="34" height="34"/>
  <path class="icon" d="M1466 160 L1473 167 L1486 148"/>
  <rect class="btn" x="1498" y="142" width="34" height="34"/>
  <path class="icon" d="M1510 150 H1523 M1510 159 H1527 M1510 168 H1520"/>
  <rect class="btn" x="1540" y="142" width="34" height="34"/>
  <path class="icon" d="M1550 150 L1564 164 M1564 150 L1550 164"/>

  <rect class="soft" x="1012" y="204" width="566" height="36"/>
  <text class="t" x="1024" y="227">Reviewed</text>
  <text class="t" x="1118" y="227">Embedded</text>
  <text class="t" x="1212" y="227">OCR</text>
  <text class="t" x="1270" y="227">Compare</text>
  <text class="muted" x="1370" y="227">Autosaved 10:42</text>

  <rect class="panel" x="1012" y="250" width="566" height="476"/>
  <line class="dash" x1="1038" y1="288" x2="1552" y2="288"/>
  <line class="dash" x1="1038" y1="326" x2="1552" y2="326"/>
  <line class="dash" x1="1038" y1="364" x2="1552" y2="364"/>
  <line class="dash" x1="1038" y1="402" x2="1552" y2="402"/>
  <text class="h" x="1178" y="498">Editable Reviewed Page Text</text>
  <text class="muted" x="1135" y="526">Plain UTF-8 search surrogate, no front matter</text>

  <rect class="soft" x="1012" y="744" width="566" height="54"/>
  <text class="h" x="1024" y="777">Review Status</text>
  <rect class="btn" x="1162" y="754" width="72" height="30"/>
  <text class="small" x="1180" y="774">Raw</text>
  <rect class="btn" x="1242" y="754" width="72" height="30"/>
  <text class="small" x="1258" y="774">Edited</text>
  <rect class="btn" x="1322" y="754" width="82" height="30"/>
  <text class="small" x="1340" y="774">Accept</text>
  <rect class="btn" x="1412" y="754" width="72" height="30"/>
  <text class="small" x="1430" y="774">Skip</text>
  <rect class="btn" x="1492" y="754" width="72" height="30"/>
  <text class="small" x="1505" y="774">Quar.</text>

  <rect class="soft" x="1012" y="816" width="566" height="64"/>
  <text class="h" x="1024" y="842">Page Notes / Warnings</text>
  <text class="small" x="1024" y="866">Use notes for review context. Reports must not include substantive source text.</text>

  <!-- Status bar -->
  <text class="small" x="18" y="925">Ready | Work folder valid: warnings | Theme: Sepia | Tools: Qt PDF, Poppler, Tesseract available | Local filesystem path</text>

  <!-- Requirement callout -->
  <rect class="note" x="1050" y="84" width="515" height="36"/>
  <text class="small" x="1062" y="107">Conceptual workflow wireframe v2: toolbar, tooltips, sync, review state, themes, diagnostics.</text>
</svg>
